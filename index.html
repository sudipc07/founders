<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Future Founders — Illustration Review</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>Future Founders</h1>
      <p class="subtitle">Illustration review — enter your password to continue</p>
      <form id="login-form">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" autofocus />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Enter</button>
        <p class="error-msg" id="error-msg">Wrong password. Please try again.</p>
      </form>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    // Already logged in?
    if (sessionStorage.getItem('role')) {
      window.location.href = '/chapters.html'
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const pw = document.getElementById('password').value
      const ok = await login(pw)
      if (!ok) {
        document.getElementById('error-msg').classList.add('visible')
      }
    })
  </script>
</body>
</html>
