<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review — Future Founders</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { overflow: hidden; }

    .review-layout {
      display: flex;
      height: calc(100vh - 60px);
    }

    /* Left sidebar */
    .nav-sidebar {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--surface);
      overflow-y: auto;
      padding: 16px 0;
    }

    .sidebar-chapter {
      margin-bottom: 4px;
    }

    .sidebar-chapter-heading {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-muted);
      padding: 6px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
      transition: color 0.15s;
    }

    .sidebar-chapter-heading:hover { color: var(--ink); }
    .sidebar-chapter-heading.has-active { color: var(--accent); }

    .sidebar-chapter-arrow {
      font-size: 10px;
      transition: transform 0.2s;
    }

    .sidebar-chapter.collapsed .sidebar-chapter-arrow {
      transform: rotate(-90deg);
    }

    .sidebar-chapter-images {
      padding: 4px 12px 8px;
    }

    .sidebar-chapter.collapsed .sidebar-chapter-images {
      display: none;
    }

    .sidebar-thumb {
      cursor: pointer;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 6px;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }

    .sidebar-thumb:hover { border-color: var(--border); }
    .sidebar-thumb.active { border-color: var(--accent); }

    .sidebar-thumb img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
    }

    .sidebar-empty {
      font-size: 11px;
      color: var(--ink-muted);
      padding: 4px 4px 8px;
      font-style: italic;
    }

    /* Main content */
    .review-main {
      flex: 1;
      min-width: 0;
      overflow-y: auto;
      padding: 20px 28px;
    }

    .main-image-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .main-image-wrap img {
      width: 100%;
      display: block;
    }

    .main-image-body {
      padding: 20px 24px;
    }

    .no-selection {
      text-align: center;
      padding: 80px 40px;
      color: var(--ink-muted);
    }

    .no-selection h2 {
      font-size: 22px;
      margin-bottom: 8px;
      color: var(--ink);
    }

    @media (max-width: 700px) {
      body { overflow: auto; }
      .review-layout { flex-direction: column; height: auto; }
      .nav-sidebar {
        width: 100%;
        height: auto;
        overflow-x: auto;
        overflow-y: hidden;
        display: flex;
        gap: 16px;
        padding: 12px 16px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-chapter { flex-shrink: 0; }
      .sidebar-chapter-images { display: flex; gap: 6px; padding: 4px 0 0; }
      .sidebar-thumb { width: 80px; margin-bottom: 0; }
      .review-main { padding: 20px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <span class="nav-brand">Future Founders</span>
    <div class="nav-actions">
      <span id="admin-nav" style="display:none">
        <a href="/admin.html" class="btn btn-secondary" style="font-size:13px">Admin Panel</a>
      </span>
      <a href="/chapters.html" class="btn btn-ghost">All Chapters</a>
      <button onclick="logout()" class="btn btn-ghost">Log out</button>
    </div>
  </nav>

  <div class="review-layout">
    <div class="nav-sidebar" id="nav-sidebar">
      <div style="padding:0 16px 12px;font-size:11px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.07em">Book Contents</div>
      <div id="sidebar-content"><div style="padding:16px;font-size:13px;color:var(--ink-muted)">Loading…</div></div>
    </div>

    <div class="review-main" id="review-main">
      <div class="no-selection">
        <h2>Select an illustration</h2>
        <p>Choose a chapter and image from the panel on the left.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="supabase.js"></script>
  <script>
    const role = requireAuth()
    if (role === 'admin') document.getElementById('admin-nav').style.display = 'inline'

    let allChapters = []
    let allImages = {}
    let currentImageId = null
    let currentChapterId = null

    async function init() {
      const { data: chapters } = await supabaseClient
        .from('chapters').select('*').order('number')

      const { data: images } = await supabaseClient
        .from('images').select('*').order('sort_order')

      allChapters = chapters || []
      allImages = {}
      for (const img of (images || [])) {
        if (!allImages[img.chapter_id]) allImages[img.chapter_id] = []
        allImages[img.chapter_id].push(img)
      }

      renderSidebar()

      // Open chapter from URL if provided
      const params = new URLSearchParams(window.location.search)
      const chId = params.get('id')
      if (chId) {
        const ch = allChapters.find(c => c.id === chId)
        if (ch) expandChapter(chId)
      }
    }

    function renderSidebar() {
      const container = document.getElementById('sidebar-content')
      container.innerHTML = allChapters.map(ch => {
        const imgs = allImages[ch.id] || []
        const thumbsHtml = imgs.length === 0
          ? `<div class="sidebar-empty">No images yet</div>`
          : imgs.map(img => {
              const { data: urlData } = supabaseClient.storage.from('illustrations').getPublicUrl(img.storage_path)
              return `<div class="sidebar-thumb" id="sthumb-${img.id}" onclick="selectImage('${img.id}','${ch.id}')">
                <img src="${urlData.publicUrl}" alt="" />
              </div>`
            }).join('')

        return `
          <div class="sidebar-chapter" id="schapter-${ch.id}">
            <div class="sidebar-chapter-heading" onclick="toggleChapter('${ch.id}')">
              <span>${ch.title}</span>
              <span class="sidebar-chapter-arrow">▾</span>
            </div>
            <div class="sidebar-chapter-images">${thumbsHtml}</div>
          </div>
        `
      }).join('')
    }

    function toggleChapter(chapterId) {
      const el = document.getElementById(`schapter-${chapterId}`)
      el.classList.toggle('collapsed')
    }

    function expandChapter(chapterId) {
      const el = document.getElementById(`schapter-${chapterId}`)
      if (el) el.classList.remove('collapsed')
    }

    async function selectImage(imageId, chapterId) {
      // Update active states
      document.querySelectorAll('.sidebar-thumb').forEach(el => el.classList.remove('active'))
      document.getElementById(`sthumb-${imageId}`)?.classList.add('active')

      // Mark chapter heading
      document.querySelectorAll('.sidebar-chapter-heading').forEach(el => el.classList.remove('has-active'))
      document.querySelector(`#schapter-${chapterId} .sidebar-chapter-heading`)?.classList.add('has-active')

      currentImageId = imageId
      currentChapterId = chapterId

      const img = Object.values(allImages).flat().find(i => i.id === imageId)
      const ch = allChapters.find(c => c.id === chapterId)

      const { data: urlData } = supabaseClient.storage.from('illustrations').getPublicUrl(img.storage_path)

      const adminControls = role === 'admin' ? `
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <input class="caption-edit-input" data-id="${img.id}" value="${escHtml(img.caption || '')}" placeholder="Add caption…" style="flex:1;min-width:200px;font-size:19px;padding:8px 12px" />
          <button class="btn btn-secondary" onclick="saveImageMeta('${img.id}', this)" style="font-size:17px;padding:8px 16px;white-space:nowrap">Save</button>
          <button class="btn-delete" onclick="deleteImage('${img.id}','${chapterId}')" title="Delete image">×</button>
        </div>
      ` : (img.caption ? `<p class="image-caption" style="font-size:20px">${escHtml(img.caption)}</p>` : '')

      const notesBlock = role === 'admin' ? `
        <div style="margin-top:12px">
          <textarea data-notes-id="${img.id}" placeholder="Add a write-up about this illustration…" style="width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:4px;font-family:'Source Sans 3',sans-serif;font-size:19px;color:var(--ink);resize:vertical;min-height:110px;outline:none;line-height:1.7">${escHtml(img.notes || '')}</textarea>
        </div>
      ` : (img.notes ? `<div style="margin-top:14px;font-size:21px;color:var(--ink);line-height:1.75;white-space:pre-wrap">${escHtml(img.notes)}</div>` : '')

      document.getElementById('review-main').innerHTML = `
        <div style="font-size:13px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;margin-bottom:10px">${ch.title}</div>
        <div class="main-image-wrap">
          <img src="${urlData.publicUrl}" alt="${escHtml(img.caption || '')}" />
          <div class="main-image-body">
            ${adminControls}
            ${notesBlock}
          </div>
        </div>
        <div id="comments-area"></div>
      `

      loadComments(chapterId)
    }

    async function saveImageMeta(imageId, btn) {
      const caption = document.querySelector(`input[data-id="${imageId}"]`).value.trim()
      const notes = document.querySelector(`textarea[data-notes-id="${imageId}"]`).value.trim()
      btn.textContent = 'Saving…'
      btn.disabled = true
      const { error } = await supabaseClient.from('images').update({ caption, notes }).eq('id', imageId)
      // Update local cache
      const img = Object.values(allImages).flat().find(i => i.id === imageId)
      if (img && !error) { img.caption = caption; img.notes = notes }
      btn.textContent = error ? 'Error' : 'Saved'
      setTimeout(() => { btn.textContent = 'Save'; btn.disabled = false }, 1500)
    }

    async function deleteImage(imageId, chapterId) {
      if (!confirm('Delete this image?')) return
      const { data: imgData } = await supabaseClient.from('images').select('storage_path').eq('id', imageId).single()
      await supabaseClient.storage.from('illustrations').remove([imgData.storage_path])
      await supabaseClient.from('images').delete().eq('id', imageId)
      allImages[chapterId] = (allImages[chapterId] || []).filter(i => i.id !== imageId)
      document.getElementById(`sthumb-${imageId}`)?.remove()
      document.getElementById('review-main').innerHTML = `
        <div class="no-selection"><h2>Image deleted</h2><p>Select another illustration from the left.</p></div>
      `
    }

    async function loadComments(chapterId) {
      const { data: comments } = await supabaseClient
        .from('comments').select('*').eq('chapter_id', chapterId).order('created_at', { ascending: true })

      const authorName = role === 'admin' ? 'Illustrator' : 'Author'

      let commentsHtml = ''
      if (!comments || comments.length === 0) {
        commentsHtml = '<p class="no-comments">No comments yet. Be the first to leave a note.</p>'
      } else {
        commentsHtml = comments.map(c => {
          const timeStr = new Date(c.created_at).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' })
          return `
            <div class="comment">
              <div class="comment-header">
                <span class="comment-author">${escHtml(c.author)}</span>
                <span class="comment-time">${timeStr}</span>
              </div>
              <div class="comment-body">${escHtml(c.body)}</div>
            </div>
          `
        }).join('')
      }

      const area = document.getElementById('comments-area')
      if (!area) return
      area.innerHTML = `
        <div class="comments-section">
          <h2>Notes &amp; Comments</h2>
          <div class="comment-list">${commentsHtml}</div>
          <div class="comment-form">
            <h3>Leave a note</h3>
            <div class="form-group">
              <label>Your name</label>
              <input type="text" id="comment-author" value="${authorName}" />
            </div>
            <div class="form-group">
              <label>Comment</label>
              <textarea id="comment-body" placeholder="Write your thoughts…"></textarea>
            </div>
            <button class="btn btn-primary" onclick="submitComment('${chapterId}')">Post comment</button>
            <p class="error-msg" id="comment-error">Please enter a comment.</p>
          </div>
        </div>
      `
    }

    async function submitComment(chapterId) {
      const author = document.getElementById('comment-author').value.trim()
      const body = document.getElementById('comment-body').value.trim()
      const errEl = document.getElementById('comment-error')
      if (!body) { errEl.classList.add('visible'); return }
      errEl.classList.remove('visible')
      const { error } = await supabaseClient.from('comments').insert({
        chapter_id: chapterId,
        author: author || 'Anonymous',
        body
      })
      if (!error) {
        document.getElementById('comment-body').value = ''
        await loadComments(chapterId)
      }
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
    }

    init()
  </script>
</body>
</html>
